name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Compile
        run: mvn -B -q compile

      - name: Test
        run: mvn -B -q test
        env:
          # CI doesn't have a real .env.sealed yet — the test profile
          # uses an in-memory H2 with placeholder values, so sealed-env
          # auto-config falls back to plain @Value defaults.
          SEALED_ENV_KEY: ci-placeholder-not-used

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: zentryx-status:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
